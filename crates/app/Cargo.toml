[package]
name = "app"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Tauri-приложение: оркестрация, команды, события, планировщик ингеста"

[lib]
name = "app"
path = "src/lib.rs"

[[bin]]
name = "market-terminal"
path = "src/main.rs"

[dependencies]
domain = { workspace = true }
data = { workspace = true }
storage = { workspace = true }
finam-proto = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }

# В фазе UI добавляется `tauri`. Асинхронный рантайм (`tokio`) пока нужен только
# тестам оркестрации; в bin он подключится вместе с Tauri.
[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros"] }
