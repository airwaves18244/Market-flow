[package]
name = "storage"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Локальное аналитическое хранилище (DuckDB): схема, ингест, запросы"

[dependencies]
domain = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }

# Встраиваемый DuckDB (bundled — компилируется из исходников амальгамации,
# без системной библиотеки). Колоночный OLAP-движок для аналитических запросов.
duckdb = { version = "1", features = ["bundled"] }
