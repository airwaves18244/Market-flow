[package]
name = "storage"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Локальное аналитическое хранилище (DuckDB): схема, ингест, запросы"

[dependencies]
domain = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }

# Встраиваемый DuckDB (колоночный OLAP). `bundled` собирает движок из исходников,
# поэтому крейт не требует системной библиотеки и собирается кросс-платформенно.
duckdb = { version = "1", features = ["bundled"] }

[dev-dependencies]
tempfile = "3"
