name: market-terminal CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    name: build + test + clippy (cross-platform core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace -- -D warnings
      - name: test
        run: cargo test --workspace

  frontend:
    name: build + test + check (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: install
        run: npm ci
      - name: svelte-check
        run: npm run check
      - name: test
        run: npm run test
      - name: build
        run: npm run build
